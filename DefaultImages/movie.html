<!DOCTYPE html>
<html>
<head>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            background: black;
        }

        .background-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 100%;
            width: 100%;
        }

        .speaker {
            width: 400px;
            height: 400px;
            border-radius: 50%;
            object-fit: cover;
            outline-color: rgb(70, 220, 70);
        }

        /* SIGNATURE STYLING */
        #signature {
            position: absolute;
            bottom: 50px;
            right: 50px;
            z-index: 100;
            color: white;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.8);
            letter-spacing: 1px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <img class="background-img" src="" alt="bg">
    
    <div class="container">
        <img class="speaker" src="" alt="speaker1">
        <img class="speaker" src="" alt="speaker2">
    </div>

    <div id="signature"></div>
</body>
</html>
